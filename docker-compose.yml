version: '3.8'

services:
  client:
    build: 
      context: ./client
    restart: unless-stopped
    expose:
      - "80"

  server:
    build:
      context: ./server
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
